      function CursorSystem() {
        const dotRef = useRef(null);
        const ringRef = useRef(null);

        useEffect(() => {
          if (window.innerWidth < 1024) return undefined;

          const dot = dotRef.current;
          const ring = ringRef.current;
          if (!dot || !ring || !window.gsap) return undefined;

          const dotX = gsap.quickTo(dot, "left", {
            duration: 0.14,
            ease: "power3",
          });
          const dotY = gsap.quickTo(dot, "top", {
            duration: 0.14,
            ease: "power3",
          });
          const ringX = gsap.quickTo(ring, "left", {
            duration: 0.3,
            ease: "power3",
          });
          const ringY = gsap.quickTo(ring, "top", {
            duration: 0.3,
            ease: "power3",
          });

          gsap.set([dot, ring], { opacity: 1 });

          const move = (event) => {
            dotX(event.clientX);
            dotY(event.clientY);
            ringX(event.clientX);
            ringY(event.clientY);
          };

          const hoverables = document.querySelectorAll(
            "a, button, [data-hover]",
          );
          const onEnter = () => ring.classList.add("is-hovering");
          const onLeave = () => ring.classList.remove("is-hovering");

          hoverables.forEach((node) => {
            node.addEventListener("mouseenter", onEnter);
            node.addEventListener("mouseleave", onLeave);
          });

          window.addEventListener("mousemove", move);

          return () => {
            window.removeEventListener("mousemove", move);
            hoverables.forEach((node) => {
              node.removeEventListener("mouseenter", onEnter);
              node.removeEventListener("mouseleave", onLeave);
            });
          };
        }, []);

        return (
          <>
            <div ref={dotRef} className="cursor-dot" />
            <div ref={ringRef} className="cursor-ring" />
          </>
        );
      }

      function useAgencyCore(stageRef) {
        useEffect(() => {
          const stage = stageRef.current;
          if (!stage || !window.THREE || !window.gsap || !window.ScrollTrigger)
            return undefined;

          const scene = new THREE.Scene();
          const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,
            powerPreference: "high-performance",
          });

          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.6));
          renderer.outputEncoding = THREE.sRGBEncoding;
          renderer.domElement.style.position = "absolute";
          renderer.domElement.style.inset = "0";
          renderer.domElement.style.zIndex = "1";
          stage.appendChild(renderer.domElement);

          const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
          camera.position.set(0, 0.2, 8.8);

          const ambient = new THREE.AmbientLight(0xffffff, 0.45);
          const key = new THREE.PointLight(0x39ff14, 2.1, 30, 2);
          key.position.set(3.5, 2.4, 4.6);
          const rim = new THREE.PointLight(0x9ce88d, 1.4, 40, 2);
          rim.position.set(-4.4, -2.5, -2.5);
          scene.add(ambient, key, rim);

          const root = new THREE.Group();
          scene.add(root);

          const orb = new THREE.Mesh(
            new THREE.IcosahedronGeometry(1.62, 8),
            new THREE.MeshPhysicalMaterial({
              color: 0x8aff73,
              emissive: 0x163e0e,
              emissiveIntensity: 1.25,
              transparent: true,
              opacity: 0.78,
              roughness: 0.12,
              metalness: 0.08,
              transmission: 0.74,
              thickness: 1,
              clearcoat: 1,
              clearcoatRoughness: 0.1,
            }),
          );

          const shell = new THREE.LineSegments(
            new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(1.96, 2)),
            new THREE.LineBasicMaterial({
              color: 0xc4ffb7,
              transparent: true,
              opacity: 0.18,
            }),
          );

          const ringA = new THREE.Mesh(
            new THREE.TorusGeometry(2.45, 0.05, 20, 140),
            new THREE.MeshStandardMaterial({
              color: 0x91ff7a,
              emissive: 0x39ff14,
              emissiveIntensity: 0.65,
              transparent: true,
              opacity: 0.22,
              roughness: 0.18,
              metalness: 0.2,
            }),
          );
          ringA.rotation.x = 1.18;

          const ringB = ringA.clone();
          ringB.rotation.set(0.32, 1.26, 0.1);
          ringB.scale.set(0.78, 0.78, 0.78);

          const knot = new THREE.Mesh(
            new THREE.TorusKnotGeometry(1.08, 0.16, 160, 28, 2, 5),
            new THREE.MeshPhysicalMaterial({
              color: 0x39ff14,
              emissive: 0x225d12,
              emissiveIntensity: 0.95,
              transparent: true,
              opacity: 0.35,
              roughness: 0.25,
              metalness: 0.42,
            }),
          );
          knot.scale.set(0.9, 0.9, 0.9);

          const particleCount = 1200;
          const positions = new Float32Array(particleCount * 3);
          for (let i = 0; i < particleCount; i += 1) {
            const radius = 2.1 + Math.random() * 1.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.cos(phi);
            positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
          }

          const particles = new THREE.Points(
            new THREE.BufferGeometry(),
            new THREE.PointsMaterial({
              color: 0xb7ffab,
              transparent: true,
              opacity: 0.78,
              size: 0.032,
              sizeAttenuation: true,
            }),
          );
          particles.geometry.setAttribute(
            "position",
            new THREE.BufferAttribute(positions, 3),
          );

          const uiPlanes = new THREE.Group();
          [
            { x: -2.3, y: 1.4, z: -0.5, w: 1.8, h: 0.8 },
            { x: 2.25, y: -1.15, z: 0.5, w: 1.45, h: 0.65 },
            { x: -1.7, y: -2.1, z: -0.2, w: 1.15, h: 0.5 },
          ].forEach((plane) => {
            const mesh = new THREE.Mesh(
              new THREE.PlaneGeometry(plane.w, plane.h),
              new THREE.MeshBasicMaterial({
                color: 0x8eff7b,
                transparent: true,
                opacity: 0.08,
                side: THREE.DoubleSide,
              }),
            );
            mesh.position.set(plane.x, plane.y, plane.z);
            uiPlanes.add(mesh);
          });

          root.add(orb, shell, ringA, ringB, knot, particles, uiPlanes);

          let frameId = null;
          const mouse = { x: 0, y: 0 };
          const target = { x: 0, y: 0 };

          const resize = () => {
            const bounds = stage.getBoundingClientRect();
            renderer.setSize(bounds.width, bounds.height, false);
            camera.aspect = bounds.width / bounds.height;
            camera.updateProjectionMatrix();
          };

          resize();

          const onMove = (event) => {
            const bounds = stage.getBoundingClientRect();
            target.x =
              ((event.clientX - bounds.left) / bounds.width - 0.5) * 0.9;
            target.y =
              ((event.clientY - bounds.top) / bounds.height - 0.5) * 0.9;
          };

          const tick = () => {
            mouse.x += (target.x - mouse.x) * 0.06;
            mouse.y += (target.y - mouse.y) * 0.06;

            root.rotation.y += 0.0036;
            root.rotation.x += 0.0014;
            root.rotation.y += mouse.x * 0.012;
            root.rotation.x += mouse.y * 0.009;

            orb.rotation.y -= 0.004;
            shell.rotation.x += 0.003;
            knot.rotation.x -= 0.008;
            knot.rotation.y += 0.012;
            ringA.rotation.z += 0.004;
            ringB.rotation.z -= 0.003;
            particles.rotation.y -= 0.0009;
            particles.rotation.x += 0.0007;
            uiPlanes.rotation.y += 0.0025;

            renderer.render(scene, camera);
            frameId = requestAnimationFrame(tick);
          };

          frameId = requestAnimationFrame(tick);
          stage.addEventListener("mousemove", onMove);
          window.addEventListener("resize", resize);

          const timeline = gsap.timeline({
            scrollTrigger: {
              trigger: "#home",
              start: "top top",
              end: "bottom top",
              scrub: 1.2,
            },
          });

          timeline
            .to(root.rotation, { x: 0.9, y: 2.3, ease: "none" }, 0)
            .to(root.position, { y: -0.65, z: -0.8, ease: "none" }, 0)
            .to(knot.scale, { x: 1.22, y: 1.22, z: 1.22, ease: "none" }, 0)
            .to(camera.position, { z: 7.5, ease: "none" }, 0);

          const visibility = () => {
            if (document.hidden && frameId) {
              cancelAnimationFrame(frameId);
              frameId = null;
            } else if (!document.hidden && !frameId) {
              frameId = requestAnimationFrame(tick);
            }
          };

          document.addEventListener("visibilitychange", visibility);

          return () => {
            document.removeEventListener("visibilitychange", visibility);
            stage.removeEventListener("mousemove", onMove);
            window.removeEventListener("resize", resize);
            if (frameId) cancelAnimationFrame(frameId);
            timeline.scrollTrigger?.kill();
            timeline.kill();
            renderer.dispose();
            scene.traverse((child) => {
              if (child.geometry) child.geometry.dispose();
              if (child.material) {
                if (Array.isArray(child.material)) {
                  child.material.forEach((material) => material.dispose());
                } else {
                  child.material.dispose();
                }
              }
            });
            stage.removeChild(renderer.domElement);
          };
        }, [stageRef]);
      }

                      }}
                    >

                    <MotionA

      function App() {
        const appRef = useRef(null);

        useEffect(() => {
          if (!window.gsap || !window.ScrollTrigger || !window.Lenis)
            return undefined;

          gsap.registerPlugin(ScrollTrigger);

          const lenis = new Lenis({
            duration: 1.2,
            smoothWheel: true,
            lerp: 0.08,
          });

          let rafId = null;
          const raf = (time) => {
            lenis.raf(time);
            rafId = requestAnimationFrame(raf);
          };
          rafId = requestAnimationFrame(raf);

          const anchors = document.querySelectorAll('a[href^="#"]');
          const onAnchorClick = (event) => {
            const href = event.currentTarget.getAttribute("href");
            if (!href || href === "#") return;
            const target = document.querySelector(href);
            if (!target) return;
            event.preventDefault();
            lenis.scrollTo(target, { offset: -72, duration: 1.2 });
          };

          anchors.forEach((anchor) =>
            anchor.addEventListener("click", onAnchorClick),
          );

          const cleanupFns = [];
          const ctx = gsap.context(() => {
            gsap.from(".split-inner", {
              yPercent: 110,
              opacity: 0,
              duration: 1.2,
              stagger: 0.05,
              ease: "power4.out",
              delay: 0.15,
            });

            gsap.utils.toArray("[data-reveal]").forEach((element) => {
              if (
                element.matches(".service-card, .case-card, .testimonial-mini")
              ) {
                return;
              }
              gsap.fromTo(
                element,
                { y: 54, opacity: 0 },
                {
                  y: 0,
                  opacity: 1,
                  duration: 1.05,
                  ease: "power3.out",
                  delay: Number(element.dataset.delay || 0),
                  scrollTrigger: {
                    trigger: element,
                    start: "top 88%",
                  },
                },
              );
            });

            gsap.to(".parallax-orb", {
              yPercent: -14,
              ease: "none",
              scrollTrigger: {
                trigger: "#home",
                start: "top top",
                end: "bottom top",
                scrub: 1.2,
              },
            });

            gsap.to(".hero-copy", {
              yPercent: 10,
              ease: "none",
              scrollTrigger: {
                trigger: "#home",
                start: "top top",
                end: "bottom top",
                scrub: 1.1,
              },
            });

            gsap.to(".hero-stage-raised", {
              yPercent: -4,
              rotateX: 1.4,
              ease: "none",
              transformOrigin: "50% 50%",
              scrollTrigger: {
                trigger: "#home",
                start: "top top",
                end: "bottom top",
                scrub: 1.15,
              },
            });

            gsap.utils.toArray(".service-card").forEach((card, index) => {
              gsap.fromTo(
                card,
                {
                  x: index % 2 === 0 ? -26 : 26,
                  y: 44,
                  opacity: 0,
                },
                {
                  x: 0,
                  y: 0,
                  opacity: 1,
                  duration: 1,
                  ease: "power3.out",
                  scrollTrigger: {
                    trigger: card,
                    start: "top 88%",
                  },
                },
              );
            });

            gsap.utils.toArray(".case-card").forEach((card, index) => {
              gsap.fromTo(
                card,
                { y: 60, opacity: 0, rotateY: index % 2 === 0 ? -6 : 6 },
                {
                  y: 0,
                  opacity: 1,
                  rotateY: 0,
                  duration: 1.1,
                  ease: "power3.out",
                  scrollTrigger: {
                    trigger: card,
                    start: "top 85%",
                  },
                },
              );
            });

            gsap.to(".testimonial-shell", {
              yPercent: -6,
              ease: "none",
              scrollTrigger: {
                trigger: "#testimonials",
                start: "top bottom",
                end: "bottom top",
                scrub: 1.1,
              },
            });

            gsap.utils.toArray(".testimonial-mini").forEach((card, index) => {
              gsap.fromTo(
                card,
                { x: -24, opacity: 0 },
                {
                  x: 0,
                  opacity: 1,
                  duration: 0.8,
                  ease: "power3.out",
                  scrollTrigger: {
                    trigger: card,
                    start: "top 88%",
                  },
                  delay: index * 0.04,
                },
              );
            });

            const storySection = document.getElementById("story");
            const storyInner = storySection?.querySelector(".process-inner");
            const storyStack = document.getElementById("story-stack");
            const progress = document.getElementById("story-progress-bar");
            const storyNumber = document.getElementById("story-number");
            const storyOverline = document.getElementById("story-overline");
            const storyHeadline = document.getElementById("story-headline");
            const storyDesc = document.getElementById("story-desc");
            const storyPills = document.getElementById("story-pills");
            const storyCards = gsap.utils.toArray(".process-preview-card");

            if (
              window.innerWidth >= 1024 &&
              storySection &&
              storyInner &&
              storyStack &&
              progress &&
              storyNumber &&
              storyOverline &&
              storyHeadline &&
              storyDesc &&
              storyPills &&
              storyCards.length
            ) {
              let activeStoryIndex = -1;
              let storyRefreshFrame = null;
              const storyTargets = [
                storyNumber,
                storyOverline,
                storyHeadline,
                storyDesc,
                storyPills,
              ];

              const getStoryScrollDistance = () => {
                const viewportHeight = window.innerHeight || 0;
                const tallestCard = storyCards.reduce(
                  (maxHeight, card) =>
                    Math.max(maxHeight, card.offsetHeight || 0),
                  0,
                );
                const stackHeight = storyStack.offsetHeight || 0;
                const perStepDistance = Math.max(
                  viewportHeight * 0.42,
                  tallestCard * 0.85,
                  stackHeight * 0.22,
                  220,
                );

                return Math.round(
                  Math.max(
                    perStepDistance * (workflowData.length - 1),
                    viewportHeight * 1.35,
                  ),
                );
              };

              const syncStoryProgress = (progressValue) => {
                const clampedProgress = gsap.utils.clamp(0, 1, progressValue);
                gsap.set(progress, { scaleY: clampedProgress });
                const nextIndex = Math.min(
                  workflowData.length - 1,
                  Math.round(clampedProgress * (workflowData.length - 1)),
                );
                setStoryStep(nextIndex);
              };

              const setStoryStep = (index, options = {}) => {
                const { immediate = false } = options;
                if (index === activeStoryIndex && !immediate) return;

                activeStoryIndex = index;
                const item = workflowData[index];

                storyCards.forEach((card, cardIndex) => {
                  const isActiveCard = cardIndex === index;
                  card.classList.toggle("is-active", isActiveCard);
                  gsap.to(card, {
                    y: isActiveCard ? -8 : 0,
                    opacity: isActiveCard ? 1 : 0.56,
                    duration: immediate ? 0 : 0.28,
                    ease: "power3.out",
                    overwrite: true,
                  });
                });

                if (immediate) {
                  storyNumber.textContent = item.step;
                  storyOverline.textContent = item.label;
                  storyHeadline.textContent = item.title;
                  storyDesc.textContent = item.text;
                  storyPills.innerHTML = item.pills
                    .map((pill) => `<span class="process-pill">${pill}</span>`)
                    .join("");
                  gsap.set(storyTargets, { opacity: 1, y: 0 });
                  return;
                }

                gsap.killTweensOf(storyTargets);
                gsap.to(storyTargets, {
                  opacity: 0,
                  y: 18,
                  duration: 0.16,
                  stagger: 0.025,
                  onComplete: () => {
                    storyNumber.textContent = item.step;
                    storyOverline.textContent = item.label;
                    storyHeadline.textContent = item.title;
                    storyDesc.textContent = item.text;
                    storyPills.innerHTML = item.pills
                      .map((pill) => `<span class="process-pill">${pill}</span>`)
                      .join("");
                    gsap.fromTo(
                      storyTargets,
                      { opacity: 0, y: 18 },
                      {
                        opacity: 1,
                        y: 0,
                        duration: 0.34,
                        stagger: 0.04,
                        ease: "power3.out",
                      },
                    );
                  },
                });
              };

              const queueStoryRefresh = () => {
                if (storyRefreshFrame) cancelAnimationFrame(storyRefreshFrame);
                storyRefreshFrame = requestAnimationFrame(() => {
                  storyRefreshFrame = null;
                  ScrollTrigger.refresh();
                });
              };

              gsap.set(progress, {
                scaleY: 0,
                transformOrigin: "top center",
              });
              setStoryStep(0, { immediate: true });

              storyCards.forEach((card, index) => {
                const activateCard = () => setStoryStep(index);
                card.addEventListener("mouseenter", activateCard);
                card.addEventListener("focusin", activateCard);
                cleanupFns.push(() => {
                  card.removeEventListener("mouseenter", activateCard);
                  card.removeEventListener("focusin", activateCard);
                });
              });

              ScrollTrigger.create({
                trigger: storySection,
                start: "top top",
                end: () => `+=${getStoryScrollDistance()}`,
                pin: storyInner,
                pinSpacing: true,
                scrub: 1,
                anticipatePin: 1,
                invalidateOnRefresh: true,
                onUpdate: (self) => {
                  syncStoryProgress(self.progress);
                },
              });

              const onWindowLoad = () => queueStoryRefresh();
              const onWindowResize = () => queueStoryRefresh();

              window.addEventListener("load", onWindowLoad);
              window.addEventListener("resize", onWindowResize);
              cleanupFns.push(() => {
                window.removeEventListener("load", onWindowLoad);
                window.removeEventListener("resize", onWindowResize);
                if (storyRefreshFrame) cancelAnimationFrame(storyRefreshFrame);
              });

              if (document.fonts?.ready) {
                document.fonts.ready.then(queueStoryRefresh).catch(() => {});
              }

              queueStoryRefresh();
            }
          }, appRef.current);

          const onLenisScroll = () => ScrollTrigger.update();
          lenis.on("scroll", onLenisScroll);

          const onScrollTriggerRefresh = () => {
            if (typeof lenis.resize === "function") lenis.resize();
          };
          ScrollTrigger.addEventListener("refresh", onScrollTriggerRefresh);
          cleanupFns.push(() =>
            ScrollTrigger.removeEventListener("refresh", onScrollTriggerRefresh),
          );

          return () => {
            lenis.off("scroll", onLenisScroll);
            anchors.forEach((anchor) =>
              anchor.removeEventListener("click", onAnchorClick),
            );
            cleanupFns.forEach((cleanup) => cleanup());
            ctx.revert();
            if (rafId) cancelAnimationFrame(rafId);
            lenis.destroy();
          };
        }, []);

        return (
          <div ref={appRef}>
            <LoadingScreen />
            <div className="noise-overlay" />
            <CursorSystem />
            <Navbar />
            <main>
              <HeroSection />
              <ProofStrip />
              <ServicesSection />
              <StorySection />
              <WorkSection />
              <MetricsSection />
              <TestimonialSection />
              <ContactSection />
            </main>
            <Footer />
            <WhatsAppFAB />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
